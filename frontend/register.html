<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitConnect – Register</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">💪</div>
      <h1>FitConnect</h1>
    </a>
    <div class="nav-links">
      <a href="login.html">Sign In</a>
    </div>
  </nav>

  <div class="auth-page" style="align-items:flex-start; padding-top:100px;">
    <div class="grid-bg"></div>

    <div class="auth-card" style="max-width:520px;">
      <div class="card-top-bar"></div>
      <div class="auth-card-inner">

        <div class="auth-logo">
          <div class="auth-logo-icon">💪</div>
          <div>
            <h1>FitConnect</h1>
            <span>New Member</span>
          </div>
        </div>

        <div class="auth-heading">
          <h2>Create Account</h2>
          <p>Join FitConnect and start your transformation today</p>
        </div>

        <div id="error-msg"   class="alert alert-error"></div>
        <div id="success-msg" class="alert alert-success"></div>

        <!-- Personal Info -->
        <div class="card-label">Personal Info</div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="first_name" placeholder="Juan"/>
            </div>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <div class="input-wrap">
              <span class="input-icon">👤</span>
              <input type="text" id="last_name" placeholder="dela Cruz"/>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">@</span>
            <input type="text" id="username" placeholder="juandelacruz"/>
          </div>
        </div>

        <div class="form-divider"></div>

        <!-- Contact -->
        <div class="card-label">Contact Details</div>
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="juan@email.com"/>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Phone Number</label>
            <div class="input-wrap">
              <span class="input-icon">📱</span>
              <input type="tel" id="phone" placeholder="09123456789"/>
            </div>
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <div class="input-wrap">
              <span class="input-icon">📅</span>
              <input type="date" id="birthdate"/>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Address</label>
          <div class="input-wrap">
            <span class="input-icon">📍</span>
            <input type="text" id="address" placeholder="Street, City, Province"/>
          </div>
        </div>

        <div class="form-divider"></div>

        <!-- Security -->
        <div class="card-label">Security</div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" placeholder="Minimum 8 characters"/>
            <button type="button" onclick="togglePw(this)" tabindex="-1"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;opacity:0.35;transition:opacity 0.2s;"
              onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=0.35">👁</button>
          </div>
        </div>

        <div class="form-divider"></div>

        <button class="btn btn-primary" id="reg-btn" onclick="handleRegister()">Create My Account</button>

      </div>
      <div class="auth-card-footer">
        Already have an account? <a href="login.html">Sign in here</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  
</body>
</html>
