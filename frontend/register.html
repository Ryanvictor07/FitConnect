<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitConnect — Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-8">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <h1 class="text-2xl font-bold text-center text-blue-600 mb-1">FitConnect</h1>
    <p class="text-center text-gray-400 text-sm mb-6">Create your account</p>

    <div id="error-msg"   class="hidden bg-red-100   text-red-700   p-3 rounded mb-4 text-sm"></div>
    <div id="success-msg" class="hidden bg-green-100 text-green-700 p-3 rounded mb-4 text-sm"></div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-sm text-gray-600 mb-1">First Name</label>
        <input type="text" id="first_name" placeholder="Juan"
          class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
      </div>
      <div>
        <label class="block text-sm text-gray-600 mb-1">Last Name</label>
        <input type="text" id="last_name" placeholder="Dela Cruz"
          class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Username</label>
      <input type="text" id="username" placeholder="juandelacruz"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Email Address</label>
      <input type="email" id="email" placeholder="juan@email.com"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Phone Number</label>
      <input type="tel" id="phone" placeholder="09123456789"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Date of Birth</label>
      <input type="date" id="birthdate"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <div class="mb-4">
      <label class="block text-sm text-gray-600 mb-1">Address</label>
      <input type="text" id="address" placeholder="Street, City, Province"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <div class="mb-6">
      <label class="block text-sm text-gray-600 mb-1">Password <span class="text-gray-400 text-xs">(min 8 characters)</span></label>
      <input type="password" id="password" placeholder="Minimum 8 characters"
        class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400" />
    </div>

    <button id="register-btn" onclick="handleRegister()"
      class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">
      Create Account
    </button>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="login.html" class="text-blue-600 hover:underline">Login</a>
    </p>
  </div>

  <script>
    const API = 'http://127.0.0.1:8000/api/users';

    async function handleRegister() {
      const btn        = document.getElementById('register-btn');
      const errorMsg   = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      const data = {
        first_name: document.getElementById('first_name').value.trim(),
        last_name:  document.getElementById('last_name').value.trim(),
        username:   document.getElementById('username').value.trim(),
        email:      document.getElementById('email').value.trim(),
        phone:      document.getElementById('phone').value.trim(),
        birthdate:  document.getElementById('birthdate').value,
        address:    document.getElementById('address').value.trim(),
        password:   document.getElementById('password').value,
      };

      if (!data.first_name || !data.last_name || !data.username || !data.email || !data.password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.classList.remove('hidden');
        return;
      }

      if (data.password.length < 8) {
        errorMsg.textContent = 'Password must be at least 8 characters.';
        errorMsg.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account…';

      try {
        const response = await fetch(`${API}/register/`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(data),
        });

        const result = await response.json();

        if (response.ok) {
          localStorage.setItem('access_token',  result.access);
          localStorage.setItem('refresh_token', result.refresh);
          successMsg.textContent = 'Account created! Redirecting to application…';
          successMsg.classList.remove('hidden');
          setTimeout(() => window.location.href = 'application.html', 1500);
        } else {
          const errors = Object.values(result).flat().join(' ');
          errorMsg.textContent = errors || 'Registration failed.';
          errorMsg.classList.remove('hidden');
          btn.disabled    = false;
          btn.textContent = 'Create Account';
        }
      } catch {
        errorMsg.textContent = 'Cannot connect to server. Make sure Django is running.';
        errorMsg.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
