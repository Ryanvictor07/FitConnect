<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitConnect - Status</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>FitConnect</h1>
        <button onclick="logout()">Logout</button>
    </nav>

    <div class="page-container">
        <p id="loading" style="text-align:center; color:#94a3b8; padding:40px;">
            Loading your application...
        </p>

        <div id="status-card" class="status-card" style="display:none">
            <p class="section-label">Application status</p>
            <div id="status-badge" style="margin-bottom:16px;"></div>
            <table class="status-table">
                <tr><td>Plan</td><td id="s-plan" style="font-weight:600"></td></tr>
                <tr><td>Submitted</td><td id="s-date"></td></tr>
                <tr><td>Reviewed</td><td id="s-reviewed"></td></tr>
                <tr><td>Reason</td><td id="s-reason"></td></tr>
            </table>
        </div>

        <div id="no-application" class="status-card" style="display:none; text-align:center;">
            <p style="color:#64748b; margin-bottom:16px;">You have not submitted an application yet.</p>
            <a href="application.html" class="btn btn-primary" style="display:inline-block; width:auto; padding:10px 24px;">
                Apply Now
            </a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/status.js"></script>
</body>
</html>
