<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>FitConnect - Admin Login</title>


 <style>
   *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


   body {
     min-height: 100vh;
     display: flex;
     align-items: center;
     justify-content: center;
     background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
     font-family: 'Segoe UI', system-ui, sans-serif;
   }


   .card {
     background: #ffffff;
     border-radius: 16px;
     padding: 48px 40px;
     width: 100%;
     max-width: 420px;
     box-shadow: 0 24px 60px rgba(0,0,0,0.35);
   }


   .logo {
     text-align: center;
     margin-bottom: 32px;
   }


   .logo-icon {
     width: 56px;
     height: 56px;
     background: linear-gradient(135deg, #2563eb, #1d4ed8);
     border-radius: 14px;
     display: inline-flex;
     align-items: center;
     justify-content: center;
     margin-bottom: 12px;
   }


   .logo-icon svg { width: 30px; height: 30px; fill: #fff; }


   .logo h1 {
     font-size: 22px;
     font-weight: 700;
     color: #0f172a;
   }


   .logo p {
     font-size: 13px;
     color: #64748b;
     margin-top: 4px;
   }


   .badge {
     display: inline-block;
     background: #eff6ff;
     color: #2563eb;
     font-size: 11px;
     font-weight: 600;
     padding: 4px 10px;
     border-radius: 20px;
     border: 1px solid #bfdbfe;
     margin-bottom: 24px;
   }


   label {
     display: block;
     font-size: 13px;
     font-weight: 600;
     color: #374151;
     margin-bottom: 6px;
   }


   input {
     width: 100%;
     padding: 11px 14px;
     border: 1.5px solid #e2e8f0;
     border-radius: 8px;
     font-size: 14px;
     margin-bottom: 18px;
     outline: none;
   }


   input:focus {
     border-color: #2563eb;
     box-shadow: 0 0 0 3px rgba(37,99,235,.12);
   }


   .btn {
     width: 100%;
     padding: 13px;
     background: linear-gradient(135deg, #2563eb, #1d4ed8);
     color: #fff;
     border: none;
     border-radius: 8px;
     font-size: 15px;
     font-weight: 600;
     cursor: pointer;
   }


   #error-msg {
     display: none;
     background: #fef2f2;
     border: 1px solid #fca5a5;
     color: #b91c1c;
     border-radius: 8px;
     padding: 10px;
     margin-bottom: 16px;
   }
 </style>
</head>


<body>


<div class="card">
 <div class="logo">
   <div class="logo-icon">
     <svg viewBox="0 0 24 24">
       <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
     </svg>
   </div>
   <h1>FitConnect</h1>
   <p>Admin Portal</p>
 </div>


 <div style="text-align:center;">
   <span class="badge">🔒 Admin Login</span>
 </div>


 <div id="error-msg"></div>


 <form onsubmit="handleLogin(event)">
   <label>Email</label>
   <input type="email" id="email" required>


   <label>Password</label>
   <input type="password" id="password" required>


   <button class="btn">Login</button>
 </form>
</div>


<script>
 // ✅ FIXED API URL
 const API = 'http://127.0.0.1:8000/api/users';


 async function handleLogin(e) {
   e.preventDefault();


   const err = document.getElementById('error-msg');
   err.style.display = 'none';


   try {
     const res = await fetch(`${API}/admin-login-api/`, { // ✅ FIXED ENDPOINT
       method: 'POST',
       headers: {
         'Content-Type': 'application/json'
       },
       body: JSON.stringify({
         email: document.getElementById('email').value,
         password: document.getElementById('password').value
       })
     });


     const data = await res.json();


     if (res.ok) {
       // ✅ Save tokens
       localStorage.setItem('adminToken', data.access);
       localStorage.setItem('adminUser', JSON.stringify(data.user));


       // ✅ Redirect to dashboard
       window.location.href = 'http://127.0.0.1:8000/api/users/admin-dashboard/';
     } else {
       err.textContent = data.detail || data.non_field_errors?.[0] || 'Login failed';
       err.style.display = 'block';
     }


   } catch (error) {
     err.textContent = 'Network error. Make sure Django server is running.';
     err.style.display = 'block';
   }
 }


 // ✅ Auto redirect if already logged in
 if (localStorage.getItem('adminToken')) {
   window.location.href = 'http://127.0.0.1:8000/api/users/admin-dashboard/';
 }
</script>


</body>
</html>
