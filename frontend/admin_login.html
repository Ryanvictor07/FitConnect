<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitConnect – Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/admin_login.css"/>
</head>
<body>
  <div class="glow-br"></div>
  <div class="grid-bg"></div>

  <div class="login-wrap">
    <div class="card">
      <div class="card-accent"></div>
      <div class="card-inner">

        <!-- Logo -->
        <div class="logo-row">
          <div class="logo-icon">💪</div>
          <div class="logo-text">
            <h1>FitConnect</h1>
            <span>Management System</span>
          </div>
        </div>

        <!-- Heading -->
        <div class="heading-block">
          <div class="admin-pill">Admin Portal</div>
          <h2>Welcome Back</h2>
          <p>Sign in to access the admin dashboard</p>
        </div>

        <!-- Error -->
        <div id="error-msg"></div>

        <!-- Form -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="admin@fitconnect.com" autocomplete="email" required/>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
            <button class="toggle-pw" type="button" onclick="togglePassword(this)" tabindex="-1">👁</button>
          </div>
        </div>

        <div class="divider"></div>

        <button class="btn-login" id="login-btn" onclick="handleLogin(event)">
          Login to Dashboard
        </button>

      </div>

      <div class="card-footer">
        <p>🔒 Secure admin access only</p>
        <span>FitConnect v1.0</span>
      </div>
    </div>
  </div>

  <script src="/js/admin_login.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
