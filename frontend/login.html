<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitConnect - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">FitConnect</h1>
        <h2 class="text-lg text-center text-gray-600 mb-6">Login to your account</h2>

        <div id="error-msg" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>

        <form id="login-form">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Email address</label>
                <input type="email" id="email" placeholder="juan@email.com"
                    class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">Password</label>
                <input type="password" id="password" placeholder="Your password"
                    class="w-full border rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-400"/>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">
                Login
            </button>
        </form>
        <p class="text-center text-sm text-gray-500 mt-4">
            Don't have an account?
            <a href="register.html" class="text-blue-600 hover:underline">Register</a>
        </p>
    </div>

    <script>
        const API = 'http://127.0.0.1:8000/api/users';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');

            const data = {
                email:    document.getElementById('email').value,
                password: document.getElementById('password').value,
            };

            try {
                const response = await fetch(`${API}/login/`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(data),
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token',  result.access);
                    localStorage.setItem('refresh_token', result.refresh);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    window.location.href = 'status.html';
                } else {
                    errorMsg.textContent = result.non_field_errors || 'Invalid email or password.';
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server. Make sure Django is running.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
