<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FitConnect – Login</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">💪</div>
      <h1>FitConnect</h1>
    </a>
    <div class="nav-links">
      <a href="register.html">Create Account</a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="grid-bg"></div>

    <div class="auth-card">
      <div class="card-top-bar"></div>
      <div class="auth-card-inner">

        <div class="auth-logo">
          <div class="auth-logo-icon">💪</div>
          <div>
            <h1>FitConnect</h1>
            <span>Member Portal</span>
          </div>
        </div>

        <div class="auth-heading">
          <h2>Welcome Back</h2>
          <p>Sign in to your account to continue</p>
        </div>

        <div id="error-msg" class="alert alert-error"></div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">✉️</span>
            <input type="email" id="email" placeholder="juan@email.com" autocomplete="email"/>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
            <button class="toggle-pw" type="button" onclick="togglePw(this)" tabindex="-1"
              style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;opacity:0.35;transition:opacity 0.2s;"
              onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=0.35">👁</button>
          </div>
        </div>

        <div class="form-divider"></div>

        <button class="btn btn-primary" id="login-btn" onclick="handleLogin()">Login to Account</button>

      </div>
      <div class="auth-card-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  
</body>
</html>
