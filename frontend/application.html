<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitConnect - Apply</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">FitConnect</h1>
        <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-500">Logout</button>
    </nav>

    <div class="max-w-2xl mx-auto p-6">
        <div id="step-indicator" class="flex gap-2 mb-6">
            <div class="flex-1 h-1 rounded bg-blue-600" id="s1"></div>
            <div class="flex-1 h-1 rounded bg-gray-300" id="s2"></div>
            <div class="flex-1 h-1 rounded bg-gray-300" id="s3"></div>
            <div class="flex-1 h-1 rounded bg-gray-300" id="s4"></div>
        </div>

        <div id="error-msg" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4"></div>

        <!-- Step 1: Personal Info -->
        <div id="page-1" class="bg-white rounded-lg shadow p-6 mb-4">
            <p class="text-xs font-semibold text-gray-400 uppercase mb-4">Personal information</p>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">First name</label>
                    <input type="text" id="first_name"
                        class="w-full border rounded px-3 py-2 text-sm"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Last name</label>
                    <input type="text" id="last_name"
                        class="w-full border rounded px-3 py-2 text-sm"/>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Email address</label>
                <input type="email" id="email"
                    class="w-full border rounded px-3 py-2 text-sm"/>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Date of birth</label>
                    <input type="date" id="birthdate"
                        class="w-full border rounded px-3 py-2 text-sm"/>
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Contact number</label>
                    <input type="tel" id="phone"
                        class="w-full border rounded px-3 py-2 text-sm"/>
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Address</label>
                <input type="text" id="address"
                    class="w-full border rounded px-3 py-2 text-sm"/>
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">
                    Health document <span class="text-blue-500 text-xs">Required</span>
                </label>
                <input type="file" id="health_doc" accept=".pdf,.jpg,.png"
                    class="w-full border rounded px-3 py-2 text-sm"/>
            </div>
            <button onclick="goStep(2)"
                class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">
                Continue to plan selection →
            </button>
        </div>

        <!-- Step 2: Plan Selection -->
        <div id="page-2" class="hidden bg-white rounded-lg shadow p-6 mb-4">
            <p class="text-xs font-semibold text-gray-400 uppercase mb-4">Choose a membership plan</p>
            <div id="plans-list"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="goStep(1)"
                    class="flex-1 border py-2 rounded text-gray-600 hover:bg-gray-50">← Back</button>
                <button onclick="goStep(3)"
                    class="flex-2 flex-grow bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    Continue to trainer →
                </button>
            </div>
        </div>

        <!-- Step 3: Trainer Selection -->
        <div id="page-3" class="hidden bg-white rounded-lg shadow p-6 mb-4">
            <p class="text-xs font-semibold text-gray-400 uppercase mb-1">Personal trainer request</p>
            <p class="text-xs text-gray-400 mb-4">Optional — you may skip this step</p>
            <div id="trainers-list"></div>
            <div class="flex gap-2 mt-4">
                <button onclick="goStep(2)"
                    class="flex-1 border py-2 rounded text-gray-600 hover:bg-gray-50">← Back</button>
                <button onclick="goStep(4)"
                    class="flex-grow bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    Review and submit →
                </button>
            </div>
        </div>

        <!-- Step 4: Review -->
        <div id="page-4" class="hidden bg-white rounded-lg shadow p-6 mb-4">
            <p class="text-xs font-semibold text-gray-400 uppercase mb-4">Review your application</p>
            <table class="w-full text-sm">
                <tr class="border-b">
                    <td class="py-2 text-gray-500 w-1/3">Name</td>
                    <td id="r-name" class="py-2 font-medium"></td>
                </tr>
                <tr class="border-b">
                    <td class="py-2 text-gray-500">Email</td>
                    <td id="r-email" class="py-2"></td>
                </tr>
                <tr class="border-b">
                    <td class="py-2 text-gray-500">Plan</td>
                    <td id="r-plan" class="py-2"></td>
                </tr>
                <tr class="border-b">
                    <td class="py-2 text-gray-500">Trainer</td>
                    <td id="r-trainer" class="py-2"></td>
                </tr>
                <tr>
                    <td class="py-2 text-gray-500">Status</td>
                    <td class="py-2">
                        <span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded">
                            Pending review
                        </span>
                    </td>
                </tr>
            </table>
            <div class="flex gap-2 mt-4">
                <button onclick="goStep(3)"
                    class="flex-1 border py-2 rounded text-gray-600 hover:bg-gray-50">← Back</button>
                <button onclick="submitApplication()"
                    class="flex-grow bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    Submit application
                </button>
            </div>
        </div>
    </div>

    <script>
        const API           = 'http://127.0.0.1:8000/api/users';
        const token         = localStorage.getItem('access_token');
        let selectedPlan    = null;
        let selectedTrainer = null;
        let plansData       = [];
        let trainersData    = [];

        if (!token) window.location.href = 'login.html';

        const headers = {
            'Authorization': `Bearer ${token}`,
            'Content-Type':  'application/json',
        };

        async function loadPlans() {
            const res  = await fetch(`${API}/plans/`, { headers });
            plansData  = await res.json();
            const list = document.getElementById('plans-list');
            list.innerHTML = plansData.map(p => `
                <div onclick="selectPlan(${p.id}, '${p.name}', '${p.price}')"
                    id="plan-${p.id}"
                    class="border rounded p-3 mb-2 cursor-pointer hover:border-blue-400 flex justify-between items-center">
                    <div>
                        <p class="font-medium text-sm">${p.name}</p>
                        <p class="text-xs text-gray-400">${p.description}</p>
                    </div>
                    <span class="text-blue-600 font-medium text-sm">₱${p.price}/mo</span>
                </div>
            `).join('');
        }

        async function loadTrainers() {
            const res     = await fetch(`${API}/trainers/`, { headers });
            trainersData  = await res.json();
            const list    = document.getElementById('trainers-list');
            const noTrainer = `
                <div onclick="selectTrainer(null, 'No trainer')"
                    id="trainer-none"
                    class="border rounded p-3 mb-2 cursor-pointer hover:border-blue-400">
                    <p class="font-medium text-sm">No trainer</p>
                    <p class="text-xs text-gray-400">I'll train on my own</p>
                </div>`;
            list.innerHTML = noTrainer + trainersData.map(t => `
                <div onclick="selectTrainer(${t.id}, '${t.name}')"
                    id="trainer-${t.id}"
                    class="border rounded p-3 mb-2 cursor-pointer hover:border-blue-400">
                    <p class="font-medium text-sm">${t.name}</p>
                    <p class="text-xs text-gray-400">${t.specialty} · ${t.experience} yrs exp.</p>
                </div>
            `).join('');
        }

        function selectPlan(id, name, price) {
            plansData.forEach(p => {
                const el = document.getElementById(`plan-${p.id}`);
                if (el) el.className = 'border rounded p-3 mb-2 cursor-pointer hover:border-blue-400 flex justify-between items-center';
            });
            const el = document.getElementById(`plan-${id}`);
            if (el) el.className = 'border-2 border-blue-600 rounded p-3 mb-2 cursor-pointer flex justify-between items-center';
            selectedPlan = { id, name, price };
            document.getElementById('r-plan').textContent = `${name} — ₱${price}/mo`;
        }

        function selectTrainer(id, name) {
            trainersData.forEach(t => {
                const el = document.getElementById(`trainer-${t.id}`);
                if (el) el.className = 'border rounded p-3 mb-2 cursor-pointer hover:border-blue-400';
            });
            const noneEl = document.getElementById('trainer-none');
            if (noneEl) noneEl.className = 'border rounded p-3 mb-2 cursor-pointer hover:border-blue-400';
            const el = id ? document.getElementById(`trainer-${id}`) : noneEl;
            if (el) el.className = 'border-2 border-green-500 rounded p-3 mb-2 cursor-pointer';
            selectedTrainer = { id, name };
            document.getElementById('r-trainer').textContent = name;
        }

        function goStep(n) {
            [1, 2, 3, 4].forEach(i => {
                document.getElementById(`page-${i}`).classList.toggle('hidden', i !== n);
                const s = document.getElementById(`s${i}`);
                s.className = `flex-1 h-1 rounded ${i <= n ? 'bg-blue-600' : 'bg-gray-300'}`;
            });
            if (n === 2) loadPlans();
            if (n === 3) loadTrainers();
            if (n === 4) {
                const fn = document.getElementById('first_name').value;
                const ln = document.getElementById('last_name').value;
                document.getElementById('r-name').textContent  = `${fn} ${ln}`;
                document.getElementById('r-email').textContent = document.getElementById('email').value;
                if (!document.getElementById('r-plan').textContent) {
                    document.getElementById('r-plan').textContent = 'No plan selected';
                }
                if (!document.getElementById('r-trainer').textContent) {
                    document.getElementById('r-trainer').textContent = 'None';
                }
            }
        }

        async function submitApplication() {
            const errorMsg = document.getElementById('error-msg');
            errorMsg.classList.add('hidden');

            if (!selectedPlan) {
                errorMsg.textContent = 'Please select a membership plan.';
                errorMsg.classList.remove('hidden');
                goStep(2);
                return;
            }

            try {
                const res  = await fetch(`${API}/apply/`, {
                    method:  'POST',
                    headers: headers,
                    body:    JSON.stringify({ plan: selectedPlan.id }),
                });
                const data = await res.json();

                if (res.ok) {
                    if (selectedTrainer && selectedTrainer.id) {
                        await fetch(`${API}/trainers/request/`, {
                            method:  'POST',
                            headers: headers,
                            body:    JSON.stringify({
                                trainer:     selectedTrainer.id,
                                application: data.id,
                            }),
                        });
                    }
                    window.location.href = 'status.html';
                } else {
                    errorMsg.textContent = JSON.stringify(data);
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Cannot connect to server.';
                errorMsg.classList.remove('hidden');
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
